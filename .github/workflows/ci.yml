name: My First .NET Core Automation

# 1. When should this run?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check-build-and-test:
    # Use a clean virtual Linux environment provided by GitHub
    runs-on: ubuntu-latest

    steps:
    # Step A: Copy your project files onto the virtual machine
    # Note: fetch-depth: 0 is required so the commit linter can read the history!
    - name: Get Code From GitHub
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Step B: Check Commit Message Style using wagoid/commitlint
    - name: Check Commit Message Style
      uses: wagoid/commitlint-github-action@v5

    # Step C: Install the exact .NET 10 environment your project requires
    - name: Install .NET Setup
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # Step D: Download all your NuGet packages (like EntityFrameworkCore, AutoMapper)
    - name: Download Packages
      run: dotnet restore MisticVault.Api/MisticVault.Api.csproj

    # Step E: Compile the code and treat warnings as errors to enforce clean structure
    - name: Compile and Verify Code Style
      run: dotnet build MisticVault.Api/MisticVault.Api.csproj --configuration Release --no-restore /p:TreatWarningsAsErrors=true

    # Step F: Automatically discover and run your unit test projects
    - name: Run Automated Tests
      run: dotnet test MisticVault.Tests/MisticVault.Tests.csproj --configuration Release --no-build
